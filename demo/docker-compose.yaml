services:
  safety-island-autoware:
    network_mode: host
    image: ghcr.io/mitsudome-r/mrm-demo:universe-after-arm64
    # image: ghcr.io/autowarefoundation/autoware:universe-20250207
    volumes:
      - ./map/fault_injection:/root/autoware_map
      - ./cyclonedds.xml:/autoware/cyclonedds.xml
      - ./launch/control.launch.xml:/opt/autoware/share/tier4_control_launch/launch/control.launch.xml
    env_file:
      - common.env
    command: >
      ros2 launch autoware_launch planning_simulator.launch.xml
      map_path:=/root/autoware_map
      vehicle_model:=sample_vehicle
      sensor_model:=sample_sensor_kit
      scenario_simulation:=true
      rviz:=false
      use_sim_time:=false
  
  safety-island-simulator:
    network_mode: host
    # image: ghcr.io/autowarefoundation/autoware-tools:scenario-simulator-20250327-amd64
    image: ghcr.io/mitsudome-r/mrm-demo:scenario-simulator-arm64
    volumes:
      - ./cyclonedds.xml:/autoware/cyclonedds.xml
      - ./scenario/mrm-scenario.yaml:/autoware/scenario-sim/mrm-scenario.yaml
      - ./map/fault_injection:/autoware/scenario-sim/map
    env_file:
      - common.env

  safety-island-bridge:
    network_mode: host
    build:
      context: bridge
    volumes:
      - ./cyclonedds.xml:/autoware/cyclonedds.xml
      - ./bridge/bridge-config.yaml:/autoware/bridge-config.yaml
    env_file:
      - common.env
    command: >
      ros2 run domain_bridge domain_bridge --wait-for-publisher false /autoware/bridge-config.yaml
  
  safety-island-visualizer:
    network_mode: host
    build:
      context: visualizer
    # image: ghcr.io/mitsudome-r/mrm-demo:visualizer-arm64
    environment:
      - USE_SIM_TIME=true
    volumes:
      - ./cyclonedds.xml:/autoware/cyclonedds.xml
      - ./visualizer/autoware.rviz:/autoware/rviz/autoware.rviz
    env_file:
      - common.env
    ports:
      - 6080:6080
